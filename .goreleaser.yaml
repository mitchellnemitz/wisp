# GoReleaser configuration. Builds static wisp and wisp-lsp binaries for
# linux, macOS, and Windows on amd64 and arm64, bundles both into one archive
# per platform, writes checksums, and attaches the VSCode extension package.
#
# Validate locally with `goreleaser check` and `goreleaser release --snapshot
# --clean`. CI runs the snapshot build on every push so a config error surfaces
# before a tag is cut.
version: 2

builds:
  - id: wisp
    main: ./cmd/wisp
    binary: wisp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/mitchellnemitz/wisp/internal/version.Number={{ .Version }}
  - id: wisp-lsp
    main: ./cmd/wisp-lsp
    binary: wisp-lsp
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/mitchellnemitz/wisp/internal/version.Number={{ .Version }}

archives:
  - id: default
    ids: [wisp, wisp-lsp]
    name_template: "wisp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  # The VSCode extension .vsix is built in the release workflow before this runs.
  extra_files:
    - glob: ./editors/vscode/*.vsix
